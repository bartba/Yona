# Samsung Gauss — default configuration
# All ${VAR} values are expanded from .env / shell environment variables.

audio:
  input_device: "Poly Sync 20"     # USB direct (hw:0,0) — lower latency than BT600 (hw:1,0)
  output_device: "default"          # PulseAudio default sink → Poly Sync 20 (avoids hw: conflict)
  input_sample_rate: 16000         # Hz — required by Porcupine & Whisper
  output_sample_rate: 48000        # Hz — upsampled from TTS output before playback
  input_channels: 1                # confirmed: Sync 20 Plus DSP delivers mono (beamforming+AEC done in HW)
  output_channels: 2               # confirmed: USB audio shows 2 out (hw verified)
  chunk_size: 512                  # samples/callback = 32 ms @ 16 kHz; matches Porcupine frame_length
  buffer_seconds: 30               # ring-buffer = ~1.9 MB; holds the longest expected utterance
  chime_path: null                                   # null = generate 0.3s bell chime programmatically
  volume_percent: 95               # ALSA PCM playback volume (0-100%); null = don't touch

wake_word:
  wake_phrase: "Hey Mack"              # display phrase (what the user says); used in logs and test prompts
  model_paths:
    - "models/wake_word/Hey_Mack_20260309_205536.onnx"
  active_models:
    - "Hey_Mack_20260309_205536"       # custom model; key = filename without .onnx
  inference_framework: "onnx"        # "onnx" or "tflite"
  threshold: 0.35                    # score cutoff for detection (0.0-1.0); custom model 실제 score 범위에 맞춤 (was 0.5)
  patience: 2                        # consecutive frames above threshold to trigger; 연속 96ms 이상 유지해야 발동 (was 1)
  cooldown_seconds: 2.0              # ignore re-triggers for N seconds

vad:
  model_path: "models/silero_vad/silero_vad.onnx"
  threshold: 0.5                   # speech probability cutoff (LISTENING)
  silence_duration: 1.5            # seconds of silence to end a speech segment. Tuned up from 0.8 s — shorter values cut off natural Korean pauses mid-sentence.
  min_speech_duration: 0.3         # minimum speech length to accept
  barge_in_threshold: 0.95          # higher threshold during SPEAKING (AEC residual)

stt:
  model_size: "large-v3-turbo"
  device: "cuda"
  compute_type: "float16"
  beam_size: 3                     # beam search (1=greedy, 5=max; 3 balances accuracy vs Jetson 8GB memory)
  language: null                   # null = auto-detect; set e.g. "ko" to force a fixed language
  allowed_languages: [ko, en]      # restrict auto-detection to these languages; first = fallback
  lang_recheck_min_prob: 0.3       # min language_probability to accept a forced-language recheck result

llm:
  # Provider selection: "openai", "claude", "custom", or "api"
  #   - "api" bypasses the LLM and POSTs the STT text to an arbitrary HTTP
  #     endpoint; the full response is played back via TTS in one shot.
  provider: "${LLM_PROVIDER}"

  # --- OpenAI (provider=openai) ---
  openai_api_key: "${OPENAI_API_KEY}"
  openai_model: "${OPENAI_MODEL}"

  # --- Claude / Anthropic (provider=claude) ---
  claude_api_key: "${CLAUDE_API_KEY}"
  claude_model: "${CLAUDE_MODEL}"

  # --- Samsung Gauss OpenAPI (provider=custom) ---
  custom_url: "${CUSTOM_LLM_URL}"                    # {ENDPOINT_URL}/openapi/chat/v1/messages
  custom_key: "${CUSTOM_LLM_KEY}"                    # x-openapi-token (Bearer token)
  custom_client_token: "${CUSTOM_LLM_CLIENT_TOKEN}"  # x-generative-ai-client (JWT)
  custom_model_id: "${CUSTOM_LLM_MODEL_ID}"          # UUID e.g. "0196f1fc-2858-70a9-..."
  custom_user_email: "${CUSTOM_LLM_USER_EMAIL}"      # optional portal email

  # --- Arbitrary HTTP API (provider=api) ---
  # LLM 대신 임의의 HTTP API에 단발 POST → 응답 전체를 한 번에 받아 TTS 재생.
  api:
    url: "${API_LLM_URL}"            # 필수. POST 대상 엔드포인트
    auth_header: "${API_LLM_KEY}"    # 선택. Authorization 헤더값 (예: "Bearer xxx")
    request_key: "query"             # 요청 body: {"<request_key>": "<STT 텍스트>"}
    response_path: "response"        # 응답 JSON 텍스트 경로 (dot path, 예: "result.text")
    timeout: 30                      # 요청 타임아웃(초)

  # --- Common ---
  max_tokens: 1024
  temperature: 1.0                 # OpenAI: 신형 모델(o-series, gpt-5-mini 등)은 1.0 필수 → 1.0이면 파라미터 생략
  claude_temperature: 0.7          # Claude: API 허용 범위 0.0-1.0; 음성 어시스턴트 권장값 0.7
  custom_temperature: 0.7          # Custom(Samsung Gauss): 모델 의존적; 음성 어시스턴트 권장값 0.7
  max_context_tokens: 3000        # compress history when estimated token count exceeds this

tts:
  # Provider: "supertonic" (Supertonic — ONNX, Korean + English + 3 more)
  provider: "supertonic"

  # --- Supertonic --- multilingual (ko, en, es, pt, fr)
  language: "ko"                   # default language (pipeline switches dynamically via STT)
  voice: "M1"                      # voice style: F1-F5 (female), M1-M5 (male)
  speed: 1.0                       # speaking speed (0.5 slow ~ 2.0 fast); 1.1→1.0 to prevent English function-word omission
  total_steps: 8                   # diffusion steps (fewer = faster, more = higher quality); 
  ort_intra_threads: 2             # ORT intra-op threads (Jetson 6 cores → 3 for ORT, 3 for audio/system)
  ort_inter_threads: 2             # ORT inter-op threads (1 = minimal cross-op parallelism)

  # Silence padding around each synthesized phrase
  leading_silence_sec: 0.05        # 50 ms — 첫 음소 attention clipping 방지 (기존 하드코딩 값)
  trailing_silence_sec: 0.08       # 80 ms — 마지막 음소 tail cutoff 방지

  # Supertonic internal chunking (구 길이가 임계값 미만이면 실질적으로 동작 안 함)
  max_chunk_length: null            # null = 언어별 기본값 사용 (ko:120, en:300)
  silence_duration: 0.1             # inter-chunk 묵음 (초); 기본값 0.3s보다 짧게 설정

  # --- Common ---
  output_sample_rate: 44100        # Supertonic native output rate

conversation:
  timeout_check_seconds: 15        # silence -> ask "Are you still there?"
  timeout_final_seconds: 5         # more silence -> say goodbye -> IDLE
  timeout_check_message:
    ko: "아직 계세요?"
    en: "Are you still there?"
  timeout_final_message:
    ko: "대화를 종료합니다. 필요하시면 다시 불러주세요."
    en: "Ending our conversation. Call me anytime!"
  empty_transcription_message:
    ko: "잘 못 들었어요. 다시 말씀해 주세요."
    en: "Sorry, I didn't catch that. Could you say it again?"
  error_message:
    ko: "죄송합니다, 오류가 발생했어요. 다시 말씀해 주세요."
    en: "Sorry, something went wrong. Please try again."
  goodbye_message:
    ko: "네, 대화를 마치겠습니다. 안녕히 계세요!"
    en: "Goodbye! Have a great day!"

history:
  storage_dir: "data/history"      # daily JSON files stored here (YYYY-MM-DD.json)
  max_days: 365                    # discard files older than N days (1 year)

logging:
  level: "INFO"
  file: "logs/yona.log"
  max_bytes: 10485760              # 10 MB
  backup_count: 5

web:
  enabled: true
  host: "127.0.0.1"               # loopback only; set to 0.0.0.0 + allowed_hosts to expose on LAN
  port: 8080
  # allowed_hosts:                # optional IP allowlist when host is 0.0.0.0
  #   - "192.168.1.10"
